name: Rust

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  ORT_VERSION: 1.23.2
  ORT_ROOT: .ci
  ORT_DIR: .ci/onnxruntime
  ORT_PKGCONFIG_DIR: .ci/pkgconfig
  ORT_ASSET_ARCHIVE: .ci/ort-assets.tgz
  ORT_ARCHIVE: onnxruntime-linux-x64-1.23.2.tgz
  ORT_URL: https://github.com/microsoft/onnxruntime/releases/download/v1.23.2/onnxruntime-linux-x64-1.23.2.tgz
  ORT_SHA256: 1fa4dcaef22f6f7d5cd81b28c2800414350c10116f5fdd46a2160082551c5f9b

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # ONNX Runtime strategy features are mutually exclusive, so the regular build matrix only
        # covers legal app-facing combinations. Dedicated jobs below validate each runtime setup
        # and assert that illegal combinations fail to compile.
        include:
          - name: default
            args: "" # default runtime path via ort-download-binaries
          - name: app-features
            args: '--features "cli fetch-model"' # optional app-facing features without runtime-strategy conflicts

    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --verbose ${{ matrix.args }}
      - name: Run tests
        run: cargo test --verbose ${{ matrix.args }}

  invalid-runtime-combinations:
    name: invalid runtime combo (${{ matrix.name }})
    runs-on: ubuntu-latest
    env:
      ORT_SKIP_DOWNLOAD: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: download+dynamic
            features: "ort-download-binaries ort-load-dynamic"
          - name: download+pkg-config
            features: "ort-download-binaries ort-pkg-config"
          - name: dynamic+pkg-config
            features: "ort-load-dynamic ort-pkg-config"

    steps:
      - uses: actions/checkout@v4
      - name: Verify mutually exclusive runtime features fail to compile
        run: |
          set -euxo pipefail
          if cargo check --verbose --no-default-features --features "${{ matrix.features }}"; then
            echo "expected cargo check to fail for mutually exclusive runtime features: ${{ matrix.features }}" >&2
            exit 1
          fi

  prepare-ort-runtime:
    runs-on: ubuntu-latest

    steps:
      - name: Cache ONNX Runtime
        uses: actions/cache@v4
        with:
          path: ${{ env.ORT_ROOT }}
          key: ort-${{ runner.os }}-${{ runner.arch }}-${{ env.ORT_VERSION }}-${{ env.ORT_SHA256 }}

      - name: Download ONNX Runtime Archive
        run: |
          set -euxo pipefail
          mkdir -p "${ORT_ROOT}"
          if [ ! -f "${ORT_ROOT}/${ORT_ARCHIVE}" ]; then
            curl -L --fail --retry 3 -o "${ORT_ROOT}/${ORT_ARCHIVE}" "${ORT_URL}"
          fi

      - name: Verify ONNX Runtime Archive Checksum
        run: |
          set -euxo pipefail
          echo "${ORT_SHA256}  ${ORT_ROOT}/${ORT_ARCHIVE}" | sha256sum -c -

      - name: Extract ONNX Runtime
        run: |
          set -euxo pipefail
          if [ ! -e "${ORT_DIR}/lib/libonnxruntime.so" ]; then
            rm -rf "${ORT_DIR}" "${ORT_ROOT}/onnxruntime-linux-x64-${ORT_VERSION}"
            tar -xzf "${ORT_ROOT}/${ORT_ARCHIVE}" -C "${ORT_ROOT}"
            mv -T "${ORT_ROOT}/onnxruntime-linux-x64-${ORT_VERSION}" "${ORT_DIR}"
          fi

      - name: Package ONNX Runtime Assets
        run: |
          set -euxo pipefail
          tar -czf "${ORT_ASSET_ARCHIVE}" -C "${ORT_ROOT}" onnxruntime

      - name: Upload ONNX Runtime Assets
        uses: actions/upload-artifact@v4
        with:
          name: ort-runtime-assets
          path: ${{ env.ORT_ASSET_ARCHIVE }}

  ort-runtime:
    name: ORT runtime (${{ matrix.check }})
    needs: prepare-ort-runtime
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - dynamic
          - pkg-config
          - custom-env

    steps:
      - uses: actions/checkout@v4

      - name: Download ONNX Runtime Assets
        uses: actions/download-artifact@v4
        with:
          name: ort-runtime-assets
          path: ${{ env.ORT_ROOT }}

      - name: Unpack ONNX Runtime Assets
        run: |
          set -euxo pipefail
          tar -xzf "${ORT_ASSET_ARCHIVE}" -C "${ORT_ROOT}"

      - name: Generate pkg-config File
        if: matrix.check == 'pkg-config'
        run: |
          set -euxo pipefail
          mkdir -p "${ORT_PKGCONFIG_DIR}"
          cat > "${ORT_PKGCONFIG_DIR}/libonnxruntime.pc" <<EOF
          prefix=${GITHUB_WORKSPACE}/${ORT_DIR}
          libdir=\${prefix}/lib
          includedir=\${prefix}/include

          Name: onnxruntime
          Description: ONNX runtime
          URL: https://github.com/microsoft/onnxruntime
          Version: ${ORT_VERSION}
          Libs: -L\${libdir} -lonnxruntime
          Cflags: -I\${includedir}
          EOF

      - name: Run dynamic runtime integration tests
        if: matrix.check == 'dynamic'
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/${{ env.ORT_DIR }}/lib
          OUTLINE_TEST_ORT_DYLIB: ${{ github.workspace }}/${{ env.ORT_DIR }}/lib/libonnxruntime.so
          ORT_DYLIB_PATH: ${{ github.workspace }}/${{ env.ORT_DIR }}/lib/libonnxruntime.so
        run: |
          cargo test --verbose --no-default-features --features ort-load-dynamic --lib
          cargo test --verbose --test runtime_dynamic --test runtime_dynamic_env --no-default-features --features ort-load-dynamic -- --ignored

      - name: Run pkg-config runtime smoke tests
        if: matrix.check == 'pkg-config'
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/${{ env.ORT_DIR }}/lib
          PKG_CONFIG_PATH: ${{ github.workspace }}/${{ env.ORT_PKGCONFIG_DIR }}
        run: |
          cargo test --verbose --no-default-features --features ort-pkg-config --lib

      - name: Run custom runtime env smoke tests
        if: matrix.check == 'custom-env'
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/${{ env.ORT_DIR }}/lib
          ORT_LIB_LOCATION: ${{ github.workspace }}/${{ env.ORT_DIR }}/lib
          ORT_PREFER_DYNAMIC_LINK: "1"
        run: |
          cargo test --verbose --no-default-features --lib
