name: Rust

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # ONNX Runtime (Linux x64) archive used by the runtime-strategy CI jobs.
  # Cached under `ORT_ROOT`, unpacked to `ORT_DIR`, and shared as `ORT_ASSET_ARCHIVE`.
  ORT_VERSION: 1.24.4
  ORT_ROOT: .ci
  ORT_DIR: .ci/onnxruntime
  ORT_PKGCONFIG_DIR: .ci/pkgconfig
  ORT_ASSET_ARCHIVE: .ci/ort-assets.tgz
  ORT_ARCHIVE: onnxruntime-linux-x64-1.24.4.tgz
  ORT_URL: https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-1.24.4.tgz
  ORT_SHA256: 3a211fbea252c1e66290658f1b735b772056149f28321e71c308942cdb54b747

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run clippy
        run: cargo clippy --all-targets --features "cli fetch-model" -- -D warnings

  build:
    name: build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            args: "" # default runtime path via ort-download-binaries
          - name: app-features
            args: '--features "cli fetch-model"'
          - name: all-features
            args: "--all-features"
          - name: rten-backend
            args: "--no-default-features --features backend-rten"

    steps:
      - uses: actions/checkout@v4
      # Keep mirrored ort defaults aligned with upstream.
      - name: Check mirrored ort defaults
        if: matrix.name == 'default'
        run: python3 .github/scripts/check-ort-feature-sync.py
      - name: Build
        run: cargo build --verbose ${{ matrix.args }}
      - name: Run tests
        if: matrix.name != 'all-features'
        run: cargo test --verbose ${{ matrix.args }}
      - name: Compile tests
        if: matrix.name == 'all-features'
        run: cargo test --verbose ${{ matrix.args }} --no-run

  prepare-ort-runtime:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Cache ONNX Runtime
        uses: actions/cache@v4
        with:
          path: ${{ env.ORT_ROOT }}
          key: ort-${{ runner.os }}-${{ runner.arch }}-${{ env.ORT_VERSION }}-${{ env.ORT_SHA256 }}

      - name: Prepare ONNX Runtime Assets
        run: bash .github/scripts/prepare-ort-runtime.sh

      - name: Upload ONNX Runtime Assets
        uses: actions/upload-artifact@v4
        with:
          name: ort-runtime-assets
          path: ${{ env.ORT_ASSET_ARCHIVE }}

  ort-runtime:
    name: ORT runtime (${{ matrix.check }})
    needs: prepare-ort-runtime
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - dynamic
          - pkg-config
          - custom-env

    steps:
      - uses: actions/checkout@v4

      - name: Download ONNX Runtime Assets
        uses: actions/download-artifact@v4
        with:
          name: ort-runtime-assets
          path: ${{ env.ORT_ROOT }}

      - name: Unpack ONNX Runtime Assets
        run: tar -xzf "${ORT_ASSET_ARCHIVE}" -C "${ORT_ROOT}"

      - name: Run dynamic runtime integration tests
        if: matrix.check == 'dynamic'
        run: bash .github/scripts/run-ort-runtime-dynamic.sh

      - name: Run pkg-config runtime smoke tests
        if: matrix.check == 'pkg-config'
        run: bash .github/scripts/run-ort-runtime-pkg-config.sh

      - name: Run custom runtime env smoke tests
        if: matrix.check == 'custom-env'
        run: bash .github/scripts/run-ort-runtime-custom-env.sh
